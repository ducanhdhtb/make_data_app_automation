# Test framework config (defaults). Override via:
# - JVM props: -DbaseUrl=... -Dheadless=... -DslowMoMs=...
# - Env vars:  BASE_URL=... HEADLESS=... SLOW_MO_MS=...
#
# You can also point to a custom file:
#   -DconfigFile=/abs/path/to/test.properties
#   CONFIG_FILE=/abs/path/to/test.properties

# App endpoints
baseUrl=http://localhost:3002
apiUrl=http://localhost:3001/api

# UI run modes
# headless=true  -> headless
# headless=false -> headed
headless=true

# Playwright browser: chromium | firefox | webkit
browser=chromium

# Slow motion in milliseconds (0 = off). Useful for debugging in headed mode.
slowMoMs=0

# Collect trace.zip on UI test failure (can be large)
trace=false

# Artifacts folder for failures
artifactsDir=target/test-artifacts

# Seed account
seedEmail=linh@example.com
seedPassword=Password123!

